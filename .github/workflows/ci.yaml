name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
    uses: luxass/shared-workflows/.github/workflows/reusable-ci.yaml@f679de59851660fb23fd7e453ea66b9e76cb55aa # v0.11.0
    with:
      build-script: "build"
      lint-script: "lint"
      fmt: true
      fmt-script: "fmt:check"
      typecheck-script: "typecheck"

  test:
    permissions:
      contents: read
    strategy:
      matrix:
        node: [22, 24]
      fail-fast: false
    uses: luxass/shared-workflows/.github/workflows/reusable-test.yaml@f679de59851660fb23fd7e453ea66b9e76cb55aa # v0.11.0
    with:
      node-version: ${{ matrix.node }}
