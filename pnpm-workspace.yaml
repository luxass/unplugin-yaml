ignoreScripts: true
catalogMode: prefer
minimumReleaseAge: 5760
trustPolicy: no-downgrade
strictDepBuilds: true
blockExoticSubdeps: true
packages:
  - examples/**

minimumReleaseAgeExclude:
  - "@luxass/utils@2.7.5"

catalogs:
  dev:
    "@luxass/utils": 2.7.5
    "@nuxt/kit": 4.4.8
    "@nuxt/schema": 4.4.8
    "@rspack/core": 2.0.6
    "@types/node": 25.9.2
    astro: 6.4.5
    esbuild: 0.28.0
    oxfmt: 0.54.0
    oxlint: 1.69.0
    oxlint-tsgolint: 0.23.0
    publint: 0.3.21
    rolldown: 1.1.0
    rollup: 4.61.1
    tsdown: 0.22.2
    typescript: 6.0.3
    vite: 8.0.16
    vitest: 4.1.8
    vitest-testdirs: 4.4.3
    webpack: 5.107.2

  example:
    "@rspack/cli": 2.0.6
    "@rspack/dev-server": 2.0.3

  runtime:
    "@rollup/pluginutils": 5.4.0
    unplugin: 3.0.0
    yaml: 2.9.0

onlyBuiltDependencies:
  - esbuild
